<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Options – Accurate Labs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 2rem; }
    h1 { text-align: center; color: #333; margin-bottom: 2rem; font-size: 1.1rem; letter-spacing: .08em; text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 960px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    .card h2 { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: #888; margin-bottom: 1.25rem; }
    .preview-light { background: #fff; padding: 1.25rem 1.5rem; border-radius: 8px; border: 1px solid #eee; margin-bottom: .75rem; display: flex; align-items: center; justify-content: center; }
    .preview-dark  { background: #003366; padding: 1.25rem 1.5rem; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .label { font-size: .7rem; color: #aaa; text-align: center; margin-top: .5rem; }
  </style>
</head>
<body>
<h1>Logo Options — same circle, different icon inside</h1>
<div class="grid">

  <!-- OPTION 1: Plus sign -->
  <div class="card">
    <h2>Option 1 — Plus Sign</h2>
    <div class="preview-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="#003366"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Plus sign -->
        <path d="M37,18 L43,18 L43,37 L62,37 L62,43 L43,43 L43,62 L37,62 L37,43 L18,43 L18,37 L37,37 Z" fill="white"/>
        <!-- Gold centre dot -->
        <circle cx="40" cy="40" r="4" fill="#e8a000"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="#dde4ed" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="#003366">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <div class="preview-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="rgba(255,255,255,0.12)"/>
        <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M37,18 L43,18 L43,37 L62,37 L62,43 L43,43 L43,62 L37,62 L37,43 L18,43 L18,37 L37,37 Z" fill="white"/>
        <circle cx="40" cy="40" r="4" fill="#e8a000"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="white">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <p class="label">Light bg · Dark bg</p>
  </div>

  <!-- OPTION 2: Atom orbits -->
  <div class="card">
    <h2>Option 2 — Atom</h2>
    <div class="preview-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="#003366"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Atom orbits -->
        <ellipse cx="40" cy="40" rx="26" ry="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
        <ellipse cx="40" cy="40" rx="26" ry="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" transform="rotate(60 40 40)"/>
        <ellipse cx="40" cy="40" rx="26" ry="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" transform="rotate(-60 40 40)"/>
        <!-- Nucleus -->
        <circle cx="40" cy="40" r="6" fill="#e8a000"/>
        <!-- Electrons -->
        <circle cx="66" cy="40" r="3" fill="white"/>
        <circle cx="27" cy="31" r="3" fill="white"/>
        <circle cx="27" cy="49" r="3" fill="white"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="#dde4ed" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="#003366">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <div class="preview-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="rgba(255,255,255,0.12)"/>
        <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="40" cy="40" rx="26" ry="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
        <ellipse cx="40" cy="40" rx="26" ry="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" transform="rotate(60 40 40)"/>
        <ellipse cx="40" cy="40" rx="26" ry="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" transform="rotate(-60 40 40)"/>
        <circle cx="40" cy="40" r="6" fill="#e8a000"/>
        <circle cx="66" cy="40" r="3" fill="white"/>
        <circle cx="27" cy="31" r="3" fill="white"/>
        <circle cx="27" cy="49" r="3" fill="white"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="white">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <p class="label">Light bg · Dark bg</p>
  </div>

  <!-- OPTION 3: Microscope silhouette -->
  <div class="card">
    <h2>Option 3 — Microscope</h2>
    <div class="preview-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="#003366"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Microscope: eyepiece -->
        <rect x="37" y="10" width="6" height="10" rx="1" fill="white"/>
        <!-- Body tube -->
        <rect x="35" y="18" width="10" height="18" rx="1" fill="white"/>
        <!-- Stage arm -->
        <rect x="35" y="34" width="14" height="5" rx="1" fill="white"/>
        <!-- Objective lens -->
        <rect x="38" y="38" width="4" height="8" rx="1" fill="#e8a000"/>
        <!-- Stage platform -->
        <rect x="28" y="46" width="24" height="4" rx="1" fill="white"/>
        <!-- Base -->
        <rect x="26" y="58" width="28" height="5" rx="2" fill="white"/>
        <!-- Base leg left -->
        <rect x="27" y="50" width="4" height="10" rx="1" fill="white"/>
        <!-- Base leg right -->
        <rect x="49" y="50" width="4" height="10" rx="1" fill="white"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="#dde4ed" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="#003366">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <div class="preview-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="rgba(255,255,255,0.12)"/>
        <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="37" y="10" width="6" height="10" rx="1" fill="white"/>
        <rect x="35" y="18" width="10" height="18" rx="1" fill="white"/>
        <rect x="35" y="34" width="14" height="5" rx="1" fill="white"/>
        <rect x="38" y="38" width="4" height="8" rx="1" fill="#e8a000"/>
        <rect x="28" y="46" width="24" height="4" rx="1" fill="white"/>
        <rect x="26" y="58" width="28" height="5" rx="2" fill="white"/>
        <rect x="27" y="50" width="4" height="10" rx="1" fill="white"/>
        <rect x="49" y="50" width="4" height="10" rx="1" fill="white"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="white">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <p class="label">Light bg · Dark bg</p>
  </div>

  <!-- OPTION 4: DNA double helix -->
  <div class="card">
    <h2>Option 4 — DNA Helix</h2>
    <div class="preview-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="#003366"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <!-- DNA strand 1 (white S-curve) -->
        <path d="M32,12 C26,22 54,30 48,40 C42,50 26,55 32,65" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <!-- DNA strand 2 (gold S-curve, mirrored) -->
        <path d="M48,12 C54,22 26,30 32,40 C38,50 54,55 48,65" fill="none" stroke="#e8a000" stroke-width="3" stroke-linecap="round"/>
        <!-- Rungs -->
        <line x1="34" y1="20" x2="46" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="30" y1="32" x2="50" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="32" y1="44" x2="48" y2="44" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="36" y1="56" x2="44" y2="56" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="#dde4ed" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="#003366">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <div class="preview-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
        <circle cx="40" cy="40" r="35" fill="rgba(255,255,255,0.12)"/>
        <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
        <line x1="40" y1="1"  x2="40" y2="4"  stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="76" x2="40" y2="79" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="1"  y1="40" x2="4"  y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="76" y1="40" x2="79" y2="40" stroke="#e8a000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M32,12 C26,22 54,30 48,40 C42,50 26,55 32,65" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <path d="M48,12 C54,22 26,30 32,40 C38,50 54,55 48,65" fill="none" stroke="#e8a000" stroke-width="3" stroke-linecap="round"/>
        <line x1="34" y1="20" x2="46" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="30" y1="32" x2="50" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="32" y1="44" x2="48" y2="44" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="36" y1="56" x2="44" y2="56" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="88" y1="16" x2="88" y2="64" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
        <text x="100" y="36" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="27" letter-spacing="2" fill="white">ACCURATE</text>
        <text x="102" y="64" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="10" fill="#e8a000">LABS</text>
      </svg>
    </div>
    <p class="label">Light bg · Dark bg</p>
  </div>

</div>
</body>
</html>
