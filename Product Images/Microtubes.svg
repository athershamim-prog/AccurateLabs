<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Microtube rack base -->
  <rect x="55" y="220" width="190" height="18" rx="4" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Rack holes -->
  <ellipse cx="95" cy="220" rx="14" ry="5" fill="rgba(30,58,138,0.2)" stroke="#1d4ed8" stroke-width="1"/>
  <ellipse cx="150" cy="220" rx="14" ry="5" fill="rgba(30,58,138,0.2)" stroke="#1d4ed8" stroke-width="1"/>
  <ellipse cx="205" cy="220" rx="14" ry="5" fill="rgba(30,58,138,0.2)" stroke="#1d4ed8" stroke-width="1"/>

  <!-- Tube 1 (left, blue lid open) -->
  <path d="M82,110 L82,218 A13,13 0 0 0 108,218 L108,110 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <rect x="83" y="165" width="24" height="52" fill="rgba(96,165,250,0.38)"/>
  <line x1="83" y1="165" x2="107" y2="165" stroke="rgba(59,130,246,0.7)" stroke-width="1.5"/>
  <!-- Lid (hinged open) -->
  <path d="M82,110 L75,82 L110,82 L108,110" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Hinge dot -->
  <circle cx="82" cy="110" r="3" fill="#1d4ed8"/>

  <!-- Tube 2 (centre, lid closed) -->
  <path d="M137,100 L137,218 A13,13 0 0 0 163,218 L163,100 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <rect x="138" y="160" width="24" height="57" fill="rgba(245,158,11,0.32)"/>
  <line x1="138" y1="160" x2="162" y2="160" stroke="rgba(245,158,11,0.6)" stroke-width="1.5"/>
  <!-- Lid closed -->
  <rect x="137" y="88" width="26" height="14" rx="4" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Hinge -->
  <circle cx="137" cy="100" r="3" fill="#1d4ed8"/>

  <!-- Tube 3 (right, lid open) -->
  <path d="M192,115 L192,218 A13,13 0 0 0 218,218 L218,115 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <rect x="193" y="172" width="24" height="45" fill="rgba(52,211,153,0.32)"/>
  <line x1="193" y1="172" x2="217" y2="172" stroke="rgba(16,185,129,0.65)" stroke-width="1.5"/>
  <!-- Lid open -->
  <path d="M192,115 L185,89 L220,89 L218,115" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <circle cx="192" cy="115" r="3" fill="#1d4ed8"/>

  <!-- Size labels on tubes -->
  <text x="95" y="92" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">1.5 mL</text>
  <text x="150" y="82" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">1.5 mL</text>
  <text x="205" y="96" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">1.5 mL</text>

  <!-- Label -->
  <text x="150" y="258" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Microtubes</text>
</svg>
