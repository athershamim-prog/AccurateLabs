<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Agar / culture medium fill -->
  <circle cx="150" cy="148" r="82" fill="rgba(245,222,130,0.22)"/>
  <!-- Colony spots -->
  <circle cx="138" cy="134" r="6"  fill="rgba(30,64,175,0.22)"/>
  <circle cx="168" cy="152" r="8"  fill="rgba(30,64,175,0.18)"/>
