<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Filter box on top -->
  <rect x="90" y="22" width="120" height="38" rx="5" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150" y="36" font-family="Arial,sans-serif" font-size="8" fill="#1d4ed8" text-anchor="middle" font-weight="700">HEPA + CARBON</text>
  <text x="150" y="48" font-family="Arial,sans-serif" font-size="7" fill="#6b7280" text-anchor="middle">FILTER</text>
  <!-- Filter grid lines -->
  <line x1="110" y1="22" x2="110" y2="60" stroke="rgba(30,58,138,0.2)" stroke-width="1"/>
  <line x1="130" y1="22" x2="130" y2="60" stroke="rgba(30,58,138,0.2)" stroke-width="1"/>
  <line x1="150" y1="22" x2="150" y2="60" stroke="rgba(30,58,138,0.2)" stroke-width="1"/>
  <line x1="170" y1="22" x2="170" y2="60" stroke="rgba(30,58,138,0.2)" stroke-width="1"/>
  <line x1="190" y1="22" x2="190" y2="60" stroke="rgba(30,58,138,0.2)" stroke-width="1"/>
  <!-- Main cabinet body -->
  <rect x="45" y="58" width="210" height="195" rx="5" fill="rgba(219,234,254,0.4)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Sash frame -->
  <rect x="55" y="65" width="190" height="140" rx="4" fill="rgba(219,234,254,0.15)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Sash glass -->
  <rect x="55" y="65" width="190" height="80" rx="4" fill="rgba(147,197,253,0.18)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Sash handle -->
  <rect x="140" y="141" width="20" height="8" rx="3" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Work surface -->
  <rect x="58" y="198" width="184" height="6" rx="2" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Recirculation arrows (down through filter) -->
  <path d="M220,170 Q238,155 238,130 Q238,105 220,90" stroke="rgba(96,165,250,0.5)" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M215,90 L220,84 L225,90" fill="none" stroke="rgba(96,165,250,0.5)" stroke-width="1.5"/>
  <!-- Control panel -->
  <rect x="50" y="253" width="200" height="32" rx="4" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="57" y="258" width="65" height="20" rx="3" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="90" y="271" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">0.5 m/s FACE</text>
  <circle cx="200" cy="265" r="6" fill="#22c55e"/>
  <circle cx="220" cy="265" r="6" fill="#f59e0b"/>
  <text x="200" y="278" font-family="Arial,sans-serif" font-size="6" fill="#1d4ed8" text-anchor="middle">FAN</text>
  <text x="220" y="278" font-family="Arial,sans-serif" font-size="6" fill="#1d4ed8" text-anchor="middle">LIGHT</text>
  <text x="150" y="300" font-family="Arial,sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">Ductless Fume Hood</text>
</svg>
