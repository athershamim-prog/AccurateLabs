<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Bottle 1 (left, orange cap) -->
  <rect x="55" y="100" width="55" height="140" rx="6" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="60" y="83" width="44" height="20" rx="4" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="57" y="74" width="52" height="12" rx="5" fill="rgba(234,88,12,0.6)" stroke="#c2410c" stroke-width="1.5"/>
  <rect x="56" y="150" width="53" height="89" fill="rgba(147,197,253,0.3)"/>
  <line x1="56" y1="150" x2="109" y2="150" stroke="rgba(96,165,250,0.6)" stroke-width="1"/>
  <rect x="59" y="108" width="47" height="34" rx="2" fill="white" stroke="#1d4ed8" stroke-width="0.8"/>
  <text x="83" y="120" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">SAMPLE</text>
  <text x="83" y="131" font-family="Arial,sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">250 mL</text>

  <!-- Bottle 2 (centre, taller, blue cap) -->
  <rect x="123" y="80" width="55" height="160" rx="6" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="128" y="63" width="44" height="20" rx="4" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="125" y="54" width="52" height="12" rx="5" fill="rgba(29,78,216,0.55)" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="124" y="145" width="53" height="94" fill="rgba(96,165,250,0.28)"/>
  <line x1="124" y1="145" x2="177" y2="145" stroke="rgba(96,165,250,0.6)" stroke-width="1"/>
  <rect x="127" y="88" width="47" height="34" rx="2" fill="white" stroke="#1d4ed8" stroke-width="0.8"/>
  <text x="151" y="100" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">SAMPLE</text>
  <text x="151" y="111" font-family="Arial,sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">500 mL</text>

  <!-- Bottle 3 (right, yellow cap) -->
  <rect x="192" y="110" width="52" height="130" rx="6" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="197" y="93" width="42" height="20" rx="4" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="194" y="84" width="48" height="12" rx="5" fill="rgba(234,179,8,0.65)" stroke="#a16207" stroke-width="1.5"/>
  <rect x="193" y="163" width="50" height="76" fill="rgba(167,243,208,0.3)"/>
  <line x1="193" y1="163" x2="243" y2="163" stroke="rgba(52,211,153,0.6)" stroke-width="1"/>
  <rect x="196" y="118" width="44" height="34" rx="2" fill="white" stroke="#1d4ed8" stroke-width="0.8"/>
  <text x="218" y="130" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">SAMPLE</text>
  <text x="218" y="141" font-family="Arial,sans-serif" font-size="6.5" fill="#6b7280" text-anchor="middle">100 mL</text>

  <!-- Label -->
  <text x="150" y="265" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Sample Bottles</text>
</svg>
