<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Burette tube -->
  <rect x="141" y="22" width="18" height="210" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5" rx="1"/>
  <!-- Liquid (top ~40% filled) -->
  <rect x="142" y="23" width="16" height="84" fill="rgba(96,165,250,0.42)"/>
  <!-- Meniscus -->
  <path d="M142,107 Q150,113 158,107" fill="rgba(96,165,250,0.42)" stroke="rgba(59,130,246,0.8)" stroke-width="1.5"/>
  <!-- Stopcock barrel -->
  <rect x="131" y="232" width="38" height="14" rx="5" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Stopcock handle -->
  <line x1="150" y1="239" x2="180" y2="239" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <!-- Tip below stopcock -->
  <rect x="145" y="246" width="10" height="13" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="1.5"/>
  <path d="M145,259 L150,268 L155,259 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Graduation marks (right side, every 10 mL) -->
  <line x1="159" y1="22"  x2="169" y2="22"  stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="172" y="26"  font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8">0</text>
  <line x1="159" y1="64"  x2="169" y2="64"  stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="172" y="68"  font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8">10</text>
  <line x1="159" y1="106" x2="169" y2="106" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="172" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8">20</text>
  <line x1="159" y1="148" x2="169" y2="148" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="172" y="152" font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8">30</text>
  <line x1="159" y1="190" x2="169" y2="190" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="172" y="194" font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8">40</text>
  <line x1="159" y1="232" x2="169" y2="232" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="172" y="236" font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8">50</text>
  <!-- Minor marks (every 5 mL) -->
  <line x1="159" y1="43"  x2="165" y2="43"  stroke="#1d4ed8" stroke-width="1"/>
  <line x1="159" y1="85"  x2="165" y2="85"  stroke="#1d4ed8" stroke-width="1"/>
  <line x1="159" y1="127" x2="165" y2="127" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="159" y1="169" x2="165" y2="169" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="159" y1="211" x2="165" y2="211" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Label -->
  <text x="150" y="287" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Burette 50 mL</text>
</svg>
