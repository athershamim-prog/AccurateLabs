<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Buchner flask (Erlenmeyer + side arm) -->
  <!-- Flask neck -->
  <rect x="133" y="98" width="34" height="30" rx="4" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Flask body (conical) -->
  <path d="M133,126 L85,228 L215,228 L167,126 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Side arm (left side of flask neck) -->
  <path d="M133,116 Q108,116 96,106 Q84,96 84,88" stroke="#1d4ed8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Side arm end cap -->
  <ellipse cx="84" cy="86" rx="5" ry="4" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Hose nipple -->
  <rect x="80" y="80" width="8" height="12" rx="2" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Filtrate inside flask (blue, ~50%) -->
  <path d="M94,178 L91,228 L209,228 L206,178 Z" fill="rgba(96,165,250,0.3)"/>
  <line x1="94" y1="178" x2="206" y2="178" stroke="rgba(59,130,246,0.6)" stroke-width="1.5"/>
  <!-- Buchner funnel (on top of flask neck) -->
  <!-- Funnel bowl -->
  <path d="M110,70 L120,98 L180,98 L190,70 Z" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Funnel rim -->
  <line x1="110" y1="70" x2="190" y2="70" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Perforated plate in funnel -->
  <line x1="118" y1="90" x2="182" y2="90" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Holes in plate -->
  <circle cx="130" cy="87" r="2" fill="rgba(30,58,138,0.3)" stroke="#1d4ed8" stroke-width="0.8"/>
  <circle cx="140" cy="87" r="2" fill="rgba(30,58,138,0.3)" stroke="#1d4ed8" stroke-width="0.8"/>
  <circle cx="150" cy="87" r="2" fill="rgba(30,58,138,0.3)" stroke="#1d4ed8" stroke-width="0.8"/>
  <circle cx="160" cy="87" r="2" fill="rgba(30,58,138,0.3)" stroke="#1d4ed8" stroke-width="0.8"/>
  <circle cx="170" cy="87" r="2" fill="rgba(30,58,138,0.3)" stroke="#1d4ed8" stroke-width="0.8"/>
  <!-- Funnel stem into flask neck -->
  <rect x="140" y="94" width="20" height="8" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Rubber seal ring -->
  <rect x="130" y="96" width="40" height="4" rx="2" fill="rgba(30,58,138,0.2)" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Label -->
  <text x="150" y="260" font-family="Arial,sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">Vacuum Filter Flask</text>
</svg>
