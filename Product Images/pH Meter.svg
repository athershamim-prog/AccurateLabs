<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Meter body -->
  <rect x="113" y="35" width="74" height="118" rx="10" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Display -->
  <rect x="120" y="44" width="60" height="42" rx="4" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="150" y="61" font-family="Arial,sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">pH</text>
  <text x="150" y="78" font-family="Arial,sans-serif" font-size="17" fill="#7dd3fc" text-anchor="middle" font-weight="700">7.02</text>
  <!-- Buttons -->
  <rect x="120" y="92" width="17" height="11" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="141" y="92" width="17" height="11" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="162" y="92" width="17" height="11" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="129" y="101" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">CAL</text>
  <text x="150" y="101" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">ON</text>
  <text x="171" y="101" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">MEM</text>
  <!-- Mode indicator -->
  <rect x="120" y="108" width="60" height="10" rx="2" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="117" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">MEASURE MODE</text>
  <!-- Cable -->
  <line x1="150" y1="153" x2="150" y2="188" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"/>
  <!-- Electrode body -->
  <rect x="143" y="187" width="14" height="60" rx="3" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Reference fill (amber) -->
  <rect x="144" y="210" width="12" height="22" fill="rgba(245,158,11,0.22)"/>
  <line x1="144" y1="210" x2="156" y2="210" stroke="rgba(245,158,11,0.6)" stroke-width="1"/>
  <!-- Glass bulb -->
  <ellipse cx="150" cy="254" rx="7" ry="9" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Label -->
  <text x="150" y="280" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">pH Meter</text>
</svg>
