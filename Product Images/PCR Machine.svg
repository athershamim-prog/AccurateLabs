<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Main body -->
  <rect x="55" y="105" width="190" height="130" rx="7" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Heated lid (top) -->
  <rect x="55" y="75" width="190" height="32" rx="7" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Lid handle -->
  <rect x="135" y="66" width="30" height="10" rx="4" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Lid hinge line -->
  <line x1="55" y1="107" x2="245" y2="107" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Well plate area -->
  <rect x="70" y="118" width="130" height="80" rx="4" fill="rgba(30,58,138,0.08)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- 6x8 well grid (48 wells simplified) -->
  <g fill="rgba(30,58,138,0.25)" stroke="#1d4ed8" stroke-width="0.8">
    <circle cx="91" cy="134" r="5"/><circle cx="108" cy="134" r="5"/><circle cx="125" cy="134" r="5"/>
    <circle cx="142" cy="134" r="5"/><circle cx="159" cy="134" r="5"/><circle cx="176" cy="134" r="5"/>
    <circle cx="91" cy="150" r="5"/><circle cx="108" cy="150" r="5"/><circle cx="125" cy="150" r="5"/>
    <circle cx="142" cy="150" r="5"/><circle cx="159" cy="150" r="5"/><circle cx="176" cy="150" r="5"/>
    <circle cx="91" cy="166" r="5"/><circle cx="108" cy="166" r="5"/><circle cx="125" cy="166" r="5"/>
    <circle cx="142" cy="166" r="5"/><circle cx="159" cy="166" r="5"/><circle cx="176" cy="166" r="5"/>
    <circle cx="91" cy="182" r="5"/><circle cx="108" cy="182" r="5"/><circle cx="125" cy="182" r="5"/>
    <circle cx="142" cy="182" r="5"/><circle cx="159" cy="182" r="5"/><circle cx="176" cy="182" r="5"/>
  </g>
  <!-- Display panel -->
  <rect x="72" y="205" width="80" height="22" rx="3" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="112" y="217" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">95°C  RUNNING</text>
  <!-- Control buttons -->
  <rect x="162" y="205" width="22" height="10" rx="2" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="188" y="205" width="22" height="10" rx="2" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="173" y="214" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">RUN</text>
  <text x="199" y="214" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">STOP</text>
  <!-- LED indicator -->
  <circle cx="235" cy="118" r="5" fill="#22c55e"/>
  <!-- Label -->
  <text x="150" y="258" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">PCR Machine</text>
</svg>
