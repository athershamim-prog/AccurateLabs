<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Base -->
  <rect x="60" y="182" width="180" height="82" rx="8" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Body (cylinder) -->
  <rect x="70" y="98" width="160" height="88" rx="4" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Dome lid (half ellipse on top) -->
  <path d="M70,100 Q70,55 150,55 Q230,55 230,100" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Lid hinge -->
  <rect x="130" y="51" width="40" height="8" rx="3" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Rotor view through lid window -->
  <ellipse cx="150" cy="88" rx="48" ry="30" fill="rgba(30,58,138,0.1)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="150" cy="88" r="14" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Rotor tubes (8 positions) -->
  <line x1="150" y1="62" x2="150" y2="74" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="102" x2="150" y2="114" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="126" y1="88" x2="136" y2="88" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="164" y1="88" x2="174" y2="88" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="70" x2="140" y2="79" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="97" x2="166" y2="106" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="166" y1="70" x2="160" y2="79" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="97" x2="140" y2="106" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
  <!-- Display on base -->
  <rect x="68" y="192" width="88" height="32" rx="3" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="112" y="205" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">3000 rpm</text>
  <text x="112" y="218" font-family="Arial,sans-serif" font-size="8" fill="#7dd3fc" text-anchor="middle">t = 10:00 min</text>
  <!-- Control dials -->
  <circle cx="202" cy="206" r="14" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="202" y="222" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">RPM</text>
  <circle cx="234" cy="206" r="14" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="234" y="222" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">TIME</text>
  <!-- Label -->
  <text x="150" y="282" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Centrifuge</text>
</svg>
