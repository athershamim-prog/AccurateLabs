<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Wide mouth jar/bottle -->
  <!-- Screw cap -->
  <rect x="112" y="52" width="76" height="22" rx="8" fill="rgba(30,64,175,0.4)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Cap ridges -->
  <line x1="120" y1="52" x2="120" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <line x1="130" y1="52" x2="130" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <line x1="140" y1="52" x2="140" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <line x1="150" y1="52" x2="150" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <line x1="160" y1="52" x2="160" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <line x1="170" y1="52" x2="170" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <line x1="180" y1="52" x2="180" y2="74" stroke="rgba(30,64,175,0.3)" stroke-width="1"/>
  <!-- Neck -->
  <rect x="112" y="72" width="76" height="18" rx="2" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Jar body -->
  <rect x="95" y="88" width="110" height="162" rx="6" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Agar fill (amber/golden) -->
  <rect x="96" y="155" width="108" height="94" fill="rgba(245,158,11,0.3)"/>
  <path d="M96,155 Q150,148 204,155" fill="rgba(245,158,11,0.3)" stroke="rgba(245,158,11,0.6)" stroke-width="1.5"/>
  <!-- Powder above liquid (small amount) -->
  <rect x="96" y="88" width="108" height="20" fill="rgba(245,222,179,0.3)"/>
  <!-- Label on jar -->
  <rect x="102" y="112" width="96" height="60" rx="3" fill="white" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="127" font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8" text-anchor="middle" font-weight="700">LB BROTH</text>
  <text x="150" y="140" font-family="Arial,sans-serif" font-size="7.5" fill="#1d4ed8" text-anchor="middle">Culture Medium</text>
  <line x1="106" y1="146" x2="194" y2="146" stroke="#1d4ed8" stroke-width="0.5"/>
  <text x="150" y="157" font-family="Arial,sans-serif" font-size="7" fill="#6b7280" text-anchor="middle">500 g powder</text>
  <!-- Label -->
  <text x="150" y="272" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Culture Media</text>
</svg>
