<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Bottle 1 (blue - Methylene Blue) -->
  <rect x="58" y="105" width="50" height="115" rx="5" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="67" y="88" width="32" height="20" rx="3" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
