  <rect x="192" y="112" width="50" height="108" rx="5" fill="rgba(254,226,226,0.5)" stroke="#dc2626" stroke-width="2"/>
  <rect x="201" y="95" width="32" height="20" rx="3" fill="rgba(254,226,226,0.5)" stroke="#dc2626" stroke-width="2"/>
  <rect x="197" y="87" width="38" height="10" rx="4" fill="rgba(220,38,38,0.5)" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="193" y="158" width="48" height="61" fill="rgba(239,68,68,0.35)"/>
