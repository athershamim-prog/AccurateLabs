<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Meter body -->
  <rect x="108" y="32" width="84" height="128" rx="10" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Display -->
  <rect x="115" y="42" width="70" height="46" rx="4" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="150" y="58" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">Conductivity</text>
  <text x="150" y="74" font-family="Arial,sans-serif" font-size="15" fill="#7dd3fc" text-anchor="middle" font-weight="700">1420</text>
  <text x="150" y="83" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">µS/cm</text>
  <!-- Buttons row -->
  <rect x="115" y="94" width="20" height="12" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="140" y="94" width="20" height="12" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="165" y="94" width="20" height="12" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="125" y="103" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">CAL</text>
  <text x="150" y="103" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">MODE</text>
  <text x="175" y="103" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">ON</text>
  <!-- TDS/COND mode selector -->
  <rect x="115" y="112" width="70" height="12" rx="2" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="150" y="122" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">● COND  ○ TDS  ○ SALT</text>
  <!-- Probe cable -->
  <line x1="150" y1="160" x2="150" y2="195" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Probe body (conductivity cell) -->
  <rect x="136" y="194" width="28" height="58" rx="6" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Probe vent holes / electrodes -->
  <rect x="140" y="224" width="8" height="20" rx="2" fill="rgba(30,58,138,0.2)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="152" y="224" width="8" height="20" rx="2" fill="rgba(30,58,138,0.2)" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Temperature sensor band -->
  <rect x="137" y="210" width="26" height="6" rx="1" fill="rgba(245,158,11,0.3)" stroke="#1d4ed8" stroke-width="0.8"/>
  <!-- Label -->
  <text x="150" y="278" font-family="Arial,sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">Conductivity Meter</text>
</svg>
