<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Body -->
  <rect x="50" y="82" width="200" height="145" rx="7" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Sample compartment lid -->
  <rect x="85" y="92" width="90" height="58" rx="5" fill="rgba(30,58,138,0.12)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Lid handle -->
  <rect x="120" y="85" width="20" height="8" rx="3" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Hinge dots -->
  <circle cx="90" cy="92" r="3" fill="#1d4ed8"/>
  <circle cx="170" cy="92" r="3" fill="#1d4ed8"/>
  <!-- Display -->
  <rect x="54" y="160" width="82" height="40" rx="4" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="95" y="176" font-family="Arial,sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">λ = 540 nm</text>
  <text x="95" y="192" font-family="Arial,sans-serif" font-size="9" fill="#7dd3fc" text-anchor="middle">A = 0.485</text>
  <!-- Wavelength dial -->
  <circle cx="210" cy="178" r="22" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="2"/>
  <circle cx="210" cy="178" r="8" fill="rgba(219,234,254,0.9)" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="210" y1="157" x2="210" y2="170" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"/>
  <!-- Power LED -->
  <circle cx="240" cy="94" r="5" fill="#22c55e"/>
  <!-- USB port -->
  <rect x="195" y="218" width="18" height="8" rx="2" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Label -->
  <text x="150" y="258" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Spectrophotometer</text>
</svg>
