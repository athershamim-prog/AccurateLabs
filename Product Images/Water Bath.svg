<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Outer container -->
  <rect x="55" y="82" width="190" height="170" rx="7" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Inner tank (water area) -->
  <rect x="68" y="95" width="164" height="130" rx="4" fill="rgba(219,234,254,0.3)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Water fill -->
  <rect x="69" y="130" width="162" height="94" fill="rgba(96,165,250,0.35)"/>
  <!-- Wavy water surface -->
  <path d="M69,130 Q89,124 109,130 Q129,136 149,130 Q169,124 189,130 Q209,136 231,130" fill="none" stroke="rgba(59,130,246,0.7)" stroke-width="1.5"/>
  <!-- Sample rack inside water -->
  <rect x="90" y="148" width="30" height="60" rx="3" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="135" y="148" width="30" height="60" rx="3" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="180" y="148" width="30" height="60" rx="3" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Heating element at bottom -->
  <path d="M80,218 Q90,212 100,218 Q110,224 120,218 Q130,212 140,218 Q150,224 160,218 Q170,212 180,218 Q190,224 200,218 Q210,212 220,218" fill="none" stroke="rgba(239,68,68,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Front panel -->
  <rect x="55" y="252" width="190" height="36" rx="0" fill="rgba(219,234,254,0.4)" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Display -->
  <rect x="62" y="258" width="75" height="22" rx="3" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="100" y="268" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">SET  37.0°C</text>
  <text x="100" y="278" font-family="Arial,sans-serif" font-size="8" fill="#7dd3fc" text-anchor="middle">ACT  37.1°C</text>
  <!-- Dial -->
  <circle cx="185" cy="269" r="12" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="185" y1="258" x2="185" y2="264" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Power LED -->
  <circle cx="236" cy="266" r="5" fill="#f59e0b"/>
  <!-- Label -->
  <text x="150" y="298" font-family="Arial,sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">Water Bath</text>
</svg>
