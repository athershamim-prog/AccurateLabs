<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <defs>
    <clipPath id="bulb">
      <ellipse cx="150" cy="158" rx="36" ry="42"/>
    </clipPath>
  </defs>
  <!-- Upper stem -->
  <rect x="144" y="22" width="12" height="78" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5" rx="1"/>
  <!-- Neck widening (upper to bulb) -->
  <path d="M144,100 Q136,116 114,158 M156,100 Q164,116 186,158" stroke="#1d4ed8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Bulb -->
  <ellipse cx="150" cy="158" rx="36" ry="42" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Liquid in bulb (bottom half) -->
  <rect x="113" y="172" width="74" height="30" fill="rgba(96,165,250,0.4)" clip-path="url(#bulb)"/>
  <!-- Liquid surface in bulb -->
  <line x1="114" y1="172" x2="186" y2="172" stroke="rgba(96,165,250,0.8)" stroke-width="1.5" clip-path="url(#bulb)"/>
  <!-- Neck narrowing (bulb to lower stem) -->
  <path d="M114,158 Q126,196 144,202 M186,158 Q174,196 156,202" stroke="#1d4ed8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lower stem -->
  <rect x="144" y="200" width="12" height="52" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2.5" rx="1"/>
  <!-- Tapered tip -->
  <path d="M144,252 L147,268 L153,268 L156,252 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M147,268 L150,276 L153,268 Z" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Graduation mark on upper stem -->
  <line x1="144" y1="68" x2="133" y2="68" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="130" y="72" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8" text-anchor="end">25 mL</text>
  <!-- Label -->
  <text x="150" y="294" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Volumetric Pipette</text>
</svg>
