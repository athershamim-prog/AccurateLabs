<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Main cylinder body -->
  <rect x="75" y="70" width="150" height="175" rx="8" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Dome top -->
  <path d="M75,78 Q75,48 150,48 Q225,48 225,78" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Pressure gauge on top -->
  <circle cx="150" cy="55" r="14" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="2"/>
  <circle cx="150" cy="55" r="9" fill="white" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="150" y1="55" x2="155" y2="48" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="150" y="72" font-family="Arial,sans-serif" font-size="6" fill="#1d4ed8" text-anchor="middle">PSI</text>
  <!-- Circular door -->
  <circle cx="150" cy="155" r="52" fill="rgba(219,234,254,0.3)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Door locking bolts (8 positions) -->
  <circle cx="150" cy="100" r="6" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="150" cy="210" r="6" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="96" cy="155" r="6" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="204" cy="155" r="6" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="113" cy="113" r="5" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="187" cy="113" r="5" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="113" cy="197" r="5" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="187" cy="197" r="5" fill="rgba(219,234,254,0.8)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Door handle (wheel) -->
  <circle cx="150" cy="155" r="18" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="132" y1="155" x2="168" y2="155" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="150" y1="137" x2="150" y2="173" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Control panel at bottom -->
  <rect x="80" y="228" width="140" height="28" rx="4" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="85" y="233" width="60" height="17" rx="2" fill="#0f172a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="115" y="244" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">134°C  18min</text>
  <circle cx="178" cy="242" r="7" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="198" cy="242" r="7" fill="rgba(219,234,254,0.6)" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="212" cy="242" r="5" fill="#22c55e"/>
  <!-- Label -->
  <text x="150" y="280" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Autoclave</text>
</svg>
