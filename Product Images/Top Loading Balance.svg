<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Base body -->
  <rect x="55" y="155" width="190" height="100" rx="7" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Display (large, front-facing) -->
  <rect x="62" y="163" width="118" height="52" rx="4" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="121" y="181" font-family="Arial,sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">g</text>
  <text x="121" y="204" font-family="Arial,sans-serif" font-size="22" fill="#7dd3fc" text-anchor="middle" font-weight="700">0.00</text>
  <!-- Tare button (large, prominent) -->
  <rect x="188" y="163" width="48" height="24" rx="5" fill="rgba(59,130,246,0.35)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="212" y="178" font-family="Arial,sans-serif" font-size="9" fill="#1d4ed8" text-anchor="middle" font-weight="700">TARE</text>
  <!-- ON/OFF button -->
  <rect x="188" y="193" width="22" height="14" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="199" y="203" font-family="Arial,sans-serif" font-size="7.5" fill="#1d4ed8" text-anchor="middle">ON</text>
  <!-- Unit button -->
  <rect x="214" y="193" width="22" height="14" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="225" y="203" font-family="Arial,sans-serif" font-size="7.5" fill="#1d4ed8" text-anchor="middle">g/oz</text>
  <!-- Leveling bubble -->
  <circle cx="228" cy="238" r="9" fill="white" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="228" cy="238" r="3.5" fill="rgba(96,165,250,0.5)"/>
  <!-- Pan support column -->
  <rect x="136" y="100" width="28" height="58" rx="4" fill="rgba(219,234,254,0.45)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Large flat weighing pan -->
  <ellipse cx="150" cy="100" rx="80" ry="12" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Pan wind guard (optional low rim) -->
  <path d="M70,100 Q70,78 150,78 Q230,78 230,100" fill="none" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Feet -->
  <ellipse cx="78" cy="256" rx="12" ry="5" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <ellipse cx="222" cy="256" rx="12" ry="5" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Label -->
  <text x="150" y="282" font-family="Arial,sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">Top Loading Balance</text>
</svg>
