<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Main body -->
  <rect x="65" y="78" width="170" height="160" rx="8" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Sample compartment (circular opening on top right) -->
  <rect x="158" y="92" width="68" height="80" rx="5" fill="rgba(30,58,138,0.1)" stroke="#1d4ed8" stroke-width="2"/>
  <circle cx="192" cy="132" r="24" fill="rgba(219,234,254,0.4)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Cuvette in compartment -->
  <rect x="183" y="115" width="18" height="34" rx="2" fill="rgba(245,222,130,0.45)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Cuvette liquid -->
  <rect x="184" y="128" width="16" height="20" fill="rgba(245,158,11,0.3)"/>
  <!-- Compartment lid slot -->
  <line x1="168" y1="92" x2="226" y2="92" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Display (left side) -->
  <rect x="72" y="92" width="78" height="58" rx="4" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="111" y="112" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">Turbidity</text>
  <text x="111" y="130" font-family="Arial,sans-serif" font-size="18" fill="#7dd3fc" text-anchor="middle" font-weight="700">1.5</text>
  <text x="111" y="143" font-family="Arial,sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle">NTU</text>
  <!-- Control buttons -->
  <rect x="72" y="158" width="78" height="60" rx="4" fill="rgba(219,234,254,0.4)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="78" y="164" width="30" height="14" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="113" y="164" width="30" height="14" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="93" y="174" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">READ</text>
  <text x="128" y="174" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">CAL</text>
  <rect x="78" y="184" width="65" height="12" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="111" y="193" font-family="Arial,sans-serif" font-size="7" fill="#1d4ed8" text-anchor="middle">RANGE AUTO</text>
  <!-- Power/USB at bottom -->
  <circle cx="192" cy="185" r="8" fill="#22c55e"/>
  <text x="192" y="202" font-family="Arial,sans-serif" font-size="6.5" fill="#1d4ed8" text-anchor="middle">READY</text>
  <!-- Feet -->
  <rect x="75" y="236" width="20" height="8" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="205" y="236" width="20" height="8" rx="3" fill="rgba(219,234,254,0.7)" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- Label -->
  <text x="150" y="265" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Turbidity Meter</text>
</svg>
