<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f0f7ff" rx="12"/>
  <!-- Plastic beaker body (slight taper, plastic feel) -->
  <path d="M90,72 L80,232 L220,232 L210,72 Z" fill="rgba(219,234,254,0.5)" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Top rim -->
  <line x1="90" y1="72" x2="210" y2="72" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Pour spout -->
  <path d="M90,72 Q79,65 73,57" stroke="#1d4ed8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Liquid fill (~50%) -->
  <path d="M85,152 L83,232 L217,232 L215,152 Z" fill="rgba(147,197,253,0.3)"/>
  <line x1="85" y1="152" x2="215" y2="152" stroke="rgba(96,165,250,0.65)" stroke-width="1.5"/>
  <!-- Graduation marks -->
  <line x1="209" y1="102" x2="222" y2="102" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="225" y="106" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8">400</text>
  <line x1="210" y1="127" x2="220" y2="127" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="211" y1="152" x2="222" y2="152" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="225" y="156" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8">200</text>
  <line x1="212" y1="177" x2="220" y2="177" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="213" y1="202" x2="222" y2="202" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="225" y="206" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8">100</text>
  <!-- PP plastic marking -->
  <text x="120" y="112" font-family="Arial,sans-serif" font-size="11" fill="rgba(30,64,175,0.6)" font-weight="700">PP</text>
  <!-- Recycling symbol hint -->
  <text x="143" y="112" font-family="Arial,sans-serif" font-size="9" fill="rgba(30,64,175,0.5)">♻</text>
  <!-- Label -->
  <text x="150" y="262" font-family="Arial,sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle" font-weight="600">Plastic Beakers</text>
</svg>
